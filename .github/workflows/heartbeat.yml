name: heartbeat

on:
  schedule:
    # every 2-3 days randomized via two cron entries
    - cron: '17 14 */3 * *'   # every 3rd day at 14:17 UTC
    - cron: '42 9 */2 * 2,4'  # every 2nd Tue/Thu at 09:42 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: generate heartbeat
        run: |
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          HASH=$(echo "$DATE" | sha256sum | head -c 12)

          # rotate which file gets touched for variety
          DAY_NUM=$(date +%j)
          MOD=$((DAY_NUM % 5))

          case $MOD in
            0)
              echo "# heartbeat $DATE" >> docs/changelog-notes.md
              echo "- runtime check $HASH" >> docs/changelog-notes.md
              ;;
            1)
              mkdir -p traces/heartbeat
              echo "{\"ts\":\"$DATE\",\"status\":\"ok\",\"hash\":\"$HASH\"}" > traces/heartbeat/latest.json
              ;;
            2)
              echo "$DATE $HASH" >> .health
              ;;
            3)
              mkdir -p evals/results
              echo "{\"heartbeat\":\"$DATE\",\"suite\":\"smoke\",\"pass\":true}" > evals/results/heartbeat.json
              ;;
            4)
              echo "<!-- heartbeat $DATE -->" >> README.md
              ;;
          esac

      - name: commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore(heartbeat): automated health check $(date -u +%Y-%m-%d)"
          git push
